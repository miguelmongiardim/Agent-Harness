name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: Ruff
        run: python -m ruff check src tests

  typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: Mypy
        run: python -m mypy

  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: Unit tests
        run: >
          python -m pytest
          tests/test_schemas.py
          tests/test_policy.py
          tests/test_mock_model.py
          tests/test_retrieval.py
          tests/test_tools.py

  integration:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: Integration tests
        run: >
          python -m pytest
          tests/test_cli.py
          tests/test_runtime.py
          tests/test_storage_audit.py
          tests/test_dry_run_artifacts.py
          tests/test_context_retrieval.py
      - name: Compileall
        run: python -m compileall -q src tests

  adversarial:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: Adversarial tests
        run: >
          python -m pytest
          tests/test_policy_enforcement.py
          tests/test_tool_approval.py
          tests/test_evals_exports.py

  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: End-to-end tests
        run: >
          python -m pytest
          tests/test_runtime_resume.py
          tests/test_e2e_cli_lifecycle.py
