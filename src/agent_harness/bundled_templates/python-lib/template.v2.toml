schema_version = "template.v2"
template_id = "python-lib"
version = "1.0.0"
title = "Python Library"
description = "Minimal Python library scaffold with src layout, tests, and pyproject metadata."
minimum_agent_harness_version = "0.2.0"
required_capabilities = ["python.library"]

[parameters.package_name]
type = "path_fragment"
default = "example_python_lib"
description = "Import package directory generated by the scaffold."
required = false

[generated_schema_versions]
config = "config.v2"
policy = "policy.v2"
task = "task.v2"
template = "template.v2"

[provider_requirements]
required = false
profiles = []

[policy_requirements]
required_template_capabilities = ["python.library"]
required_tools = ["patch_file"]

[retrieval_assumptions]
backend = "lexical"
remote_embeddings = false

[eval_or_demo_metadata]
kind = "demo"
commands = ["python -m pytest"]

[[files]]
path = "pyproject.toml"
source = "files/pyproject.toml"

[[files]]
path = "src/example_python_lib/__init__.py"
source = "files/src/example_python_lib/__init__.py.template"

[[files]]
path = "src/example_python_lib/core.py"
source = "files/src/example_python_lib/core.py.template"

[[files]]
path = "tests/test_core.py"
source = "files/tests/test_core.py.template"
