schema_version = "template.v2"
template_id = "fastapi-service"
version = "1.0.0"
title = "FastAPI Service"
description = "Minimal FastAPI service scaffold with app entry point, src layout, tests, and Agent Harness workflow examples."
minimum_agent_harness_version = "0.2.0"
required_capabilities = ["python.fastapi"]

[generated_schema_versions]
config = "config.v2"
policy = "policy.v2"
task = "task.v2"
template = "template.v2"

[provider_requirements]
required = false
profiles = []

[policy_requirements]
required_template_capabilities = ["python.fastapi"]
required_tools = ["patch_file"]

[retrieval_assumptions]
backend = "lexical"
remote_embeddings = false

[eval_or_demo_metadata]
kind = "demo"
commands = ["python -m pytest"]

[[files]]
path = "README.md"
source = "files/README.md"

[[files]]
path = "pyproject.toml"
source = "files/pyproject.toml"

[[files]]
path = "src/example_fastapi_service/__init__.py"
source = "files/src/example_fastapi_service/__init__.py.template"

[[files]]
path = "src/example_fastapi_service/main.py"
source = "files/src/example_fastapi_service/main.py.template"

[[files]]
path = "tests/test_health.py"
source = "files/tests/test_health.py.template"

[[files]]
path = "examples/fastapi-service.config.json"
source = "files/examples/fastapi-service.config.json"

[[files]]
path = "examples/fastapi-service.policy.json"
source = "files/examples/fastapi-service.policy.json"

[[files]]
path = "examples/fastapi-service.task.json"
source = "files/examples/fastapi-service.task.json"

[[files]]
path = "examples/fastapi-service.eval.json"
source = "files/examples/fastapi-service.eval.json"
